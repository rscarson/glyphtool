<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E'Trois Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="text-center">E'Trois Translator</h1>
    
    <div class="mb-3">
        <label for="inputText" class="form-label">Enter Text:</label>
        <textarea class="form-control" id="inputText" rows="3"></textarea>
    </div>
    
    <button id="renderBtn" class="btn btn-primary w-100">Render</button>
    
    <h2 class="mt-4">Translation:</h2>
    <p id="translatedText" class="border p-2 bg-light"></p>
    
    <h2 class="mt-4">Rendered Image:</h2>
    <div class="text-center">
        <img id="renderedImage" class="img-fluid border" alt="Rendered translation will appear here" src="default.webp"/>
    </div>

    <!--
    
    
                <br/>
                <br/>
                <strong>Filters</strong>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        No Filter
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="sketch" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        Sketch
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="space" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        Space
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="granite" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        Granite
                    </label>
                </div>
    
    -->

<script type="text/javascript">
    document.getElementById("renderBtn").addEventListener("click", async () => {
        var text = document.getElementById('inputText').value;
        var image_out = document.getElementById('renderedImage');
        var text_out = document.getElementById('translatedText');
      //  var filter = document.querySelector('input[name="filter"]:checked').value;

        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'http://localhost:3000/render', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.responseType = 'json';
        xhr.onload = function() {
            if (xhr.status === 200) {
                let translated = xhr.response.Success.translated;
                let png_bytes = xhr.response.Success.png_bytes;

                let url = 'data:image/png;base64,' + png_bytes;
                image_out.src = url;
                image_out.title = translated;

                text_out.textContent = translated;
            }
        };
        xhr.send(JSON.stringify({text: text, filter: ""}));
    });
</script>
</body>
</html>
