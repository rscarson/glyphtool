<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E'Trois Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <div class="text-center mb-4">
        <h1 class="fw-bold">E'Trois Translator</h1>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <div class="mb-3">
                    <label for="inputText" class="form-label fw-bold">Enter Text:</label>
                    <textarea class="form-control" id="inputText" rows="8" placeholder="Type here..."></textarea>
                </div>
                
                <strong>Filters</strong>
                <div class="d-flex gap-3 my-2">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="filter" value="" checked>
                        <label class="form-check-label">No Filter</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="filter" value="sketch">
                        <label class="form-check-label">Sketch</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="filter" value="space">
                        <label class="form-check-label">Space</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="filter" value="granite">
                        <label class="form-check-label">Granite</label>
                    </div>
                </div>
                
                <button id="renderBtn" class="btn btn-primary w-100">Render</button>
            </div>
        </div>
    </div>
    
    <div class="row justify-content-center mt-4">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <div class="text-center">
                    <img id="renderedImage" class="img-fluid border" alt="Rendered translation will appear here" src="default.webp"/>
                </div>
                <p id="translatedText" class="border p-3 bg-light mt-3">Translated Text</p>
            </div>
        </div>
    </div>
    
<script>
    document.getElementById("renderBtn").addEventListener("click", async () => {
        var text = document.getElementById('inputText').value;
        var image_out = document.getElementById('renderedImage');
        var text_out = document.getElementById('translatedText');
        var filter = document.querySelector('input[name="filter"]:checked').value;

        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'http://localhost:3000/render', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.responseType = 'json';
        xhr.onload = function() {
            if (xhr.status === 200) {
                let translated = xhr.response.Success.translated;
                let bytes = xhr.response.Success.bytes;
                let format = xhr.response.Success.format;

                let url = `data:image/${format};base64,` + bytes;
                image_out.src = url;

                text_out.innerHTML = translated.replace(/\n/g, '<br />');
            }
        };
        xhr.send(JSON.stringify({text: text, filter: filter}));
    });
</script>
</body>
</html>
