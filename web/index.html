<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>
    <div class="container-fluid">
        <h1>High E'Trois Glyph Rendering Tool</h1>
        <h4>Translates text into E'troyan phonoglyphs</h4>

        <div class="row align-items-start">
            <div class="col">
                <textarea id="text-in" class="form-control" style="width: 100%; height: 100%;"></textarea>
                <br/>
                <a href="#" onClick="render()" class="btn btn-primary">Render</a>

                <br/>
                <br/>
                <strong>Filters</strong>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        No Filter
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="sketch" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        Sketch
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="space" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        Space
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="filter" value="granite" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        Granite
                    </label>
                </div>

            </div>
            <div class="col">
                <img id="image-out" />
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function render() {
            var text = document.getElementById('text-in').value;
            var image = document.getElementById('image-out');
            var filter = document.querySelector('input[name="filter"]:checked').value;

            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'http://localhost:3000/render', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.responseType = 'json';
            xhr.onload = function() {
                if (xhr.status === 200) {
                    let translated = xhr.response.Success.translated;
                    let png_bytes = xhr.response.Success.png_bytes;

                    let url = 'data:image/png;base64,' + png_bytes;
                    image.src = url;
                    image.title = translated;
                }
            };
            xhr.send(JSON.stringify({text: text, filter: filter}));
        }
    </script>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
  </body>
</html>
